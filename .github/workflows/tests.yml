name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Указываем GitHub выполнять все команды внутри папки с Django
    defaults:
      run:
        working-directory: pythonProject/BrainShare

    # ===== Services  =====
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: brainshare_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ===== Steps =====
    steps:
      # 1. Получаем код
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pythonProject/BrainShare/requirements.txt

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Проверка migrations
      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: brainshare.settings
          DB_HOST: localhost
          DB_NAME: brainshare_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
        continue-on-error: true

      # 5. Запускаем тесты
      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: brainshare.settings
          DB_HOST: localhost
          DB_NAME: brainshare_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: True
        run: |
          pytest -v --tb=short

      # 6. Результат тестов
      - name: Test Summary
        if: always()
        run: |
          echo "✅ Tests completed!"
          echo "📊 Check the results above"

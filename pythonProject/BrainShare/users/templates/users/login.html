{% extends 'base.html' %}

{% block title %}Вход - BrainShare{% endblock %}

{% block content %}
<main>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-icon">🔐</div>
                <h2 class="auth-title">Вход в BrainShare</h2>

                <form method="post" class="auth-form">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-box">
                        <p>❌ Неверное имя пользователя или пароль</p>
                    </div>
                    {% endif %}

                    <div class="form-group">
                        <label for="id_username">Имя пользователя:</label>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            required
                            placeholder="Введите имя пользователя"
                            value="{{ form.username.value|default:'' }}"
                        >
                    </div>

                    <div class="form-group">
                        <label for="id_password">Пароль:</label>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            required
                            placeholder="Введите пароль"
                        >
                    </div>

                    <button type="submit" class="auth-button">
                        Войти
                    </button>
                </form>

                <!-- Ссылка на сброс пароля -->
                <div class="forgot-password">
                    <a href="{% url 'users:password_reset' %}">
                        🔑 Забыли пароль?
                    </a>
                </div>

                <div class="auth-divider">
                    <span>или</span>
                </div>

                <div class="auth-links">
                    <p>Нет аккаунта?</p>
                    <a href="{% url 'users:register' %}" class="register-link">
                        Зарегистрироваться
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: white;
    padding: 50px;
    border-radius: 25px;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 480px;
}

.auth-icon {
    font-size: 60px;
    text-align: center;
    margin-bottom: 15px;
}

.auth-title {
    text-align: center;
    color: #333;
    margin-bottom: 35px;
    font-size: 28px;
    font-weight: 700;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.form-group label {
    font-weight: 600;
    color: #333;
    font-size: 14px;
}

.form-group input {
    padding: 16px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s;
    background: #fafafa;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.auth-button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 18px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
}

.auth-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.auth-button:active {
    transform: translateY(-1px);
}

.error-box {
    background: linear-gradient(135deg, #ffe5e5 0%, #fff0f0 100%);
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 10px;
    border-left: 4px solid #ff6b6b;
}

.error-box p {
    color: #d32f2f;
    margin: 0;
    font-weight: 500;
}

.forgot-password {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
}

.forgot-password a {
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    transition: color 0.3s;
}

.forgot-password a:hover {
    color: #764ba2;
    text-decoration: underline;
}

.auth-divider {
    text-align: center;
    margin: 25px 0;
    position: relative;
}

.auth-divider::before,
.auth-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #e0e0e0;
}

.auth-divider::before {
    left: 0;
}

.auth-divider::after {
    right: 0;
}

.auth-divider span {
    background: white;
    padding: 0 15px;
    color: #999;
    font-size: 14px;
}

.auth-links {
    text-align: center;
}

.auth-links p {
    color: #666;
    margin-bottom: 10px;
    font-size: 15px;
}

.register-link {
    display: inline-block;
    background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    color: white;
    padding: 14px 35px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: all 0.3s;
}

.register-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
}

@media (max-width: 500px) {
    .auth-card {
        padding: 30px 25px;
    }

    .auth-title {
        font-size: 24px;
    }
}
</style>
{% endblock %}

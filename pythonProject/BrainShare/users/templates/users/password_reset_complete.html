{% extends 'base.html' %}

{% block title %}Пароль изменен - BrainShare{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="success-icon">✅</div>
        <h2 class="auth-title">Пароль успешно изменен!</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            Теперь вы можете войти в систему с новым паролем.
        </p>

        <a href="{% url 'users:login' %}" class="auth-button" style="display: block; text-align: center; text-decoration: none;">
            Войти в систему
        </a>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 450px;
    text-align: center;
}

.success-icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.auth-title {
    color: #333;
    margin-bottom: 20px;
    font-size: 28px;
}

.auth-button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    text-decoration: none;
    display: block;
}

.auth-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}
</style>
{% endblock %}

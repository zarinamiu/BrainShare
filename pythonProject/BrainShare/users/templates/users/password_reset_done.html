{% extends 'base.html' %}

{% block title %}Письмо отправлено - BrainShare{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="success-icon">✉️</div>
        <h2 class="auth-title">Письмо отправлено!</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            Мы отправили вам инструкции по сбросу пароля на указанный email.
            Проверьте папку "Входящие" (и "Спам").
        </p>

        <div class="auth-links">
            <a href="{% url 'users:login' %}">← Вернуться к входу</a>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

.auth-card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 450px;
    text-align: center;
}

.success-icon {
    font-size: 60px;
    margin-bottom: 20px;
}

.auth-title {
    color: #333;
    margin-bottom: 20px;
    font-size: 28px;
}

.auth-links {
    margin-top: 30px;
}

.auth-links a {
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
}

.auth-links a:hover {
    text-decoration: underline;
}
</style>
{% endblock %}
